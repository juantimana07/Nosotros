<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>nosotros · tareas & notas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8; --warm: #E8DDD0; --ink: #2C2416; --ink-light: #6B5C48;
    --rose: #C97B6E; --rose-soft: #E8B4AD; --sage: #7A9E7E; --sage-soft: #B8D4BA;
    --gold: #C4924A; --shadow: rgba(44,36,22,0.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); font-family:'DM Sans',sans-serif; color:var(--ink); height:100dvh; overflow:hidden; display:flex; flex-direction:column; }
  header { background:var(--ink); padding:13px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:10; }
  .logo { font-family:'Playfair Display',serif; font-size:20px; color:var(--cream); cursor:pointer; user-select:none; }
  .logo span { color:var(--rose-soft); font-style:italic; }
  .header-users { display:flex; gap:6px; }
  .user-tag { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:2px solid transparent; }
  .user-tag.juan { background:rgba(201,123,110,0.2); color:var(--rose-soft); }
  .user-tag.cata { background:rgba(122,158,126,0.2); color:var(--sage-soft); }
  .user-tag.active { border-color:currentColor; }
  .user-dot { width:7px; height:7px; border-radius:50%; background:currentColor; display:inline-block; flex-shrink:0; }
  .main { flex:1; overflow:hidden; display:flex; flex-direction:column; }
  .tab-bar { display:flex; background:white; border-bottom:1px solid rgba(44,36,22,0.08); flex-shrink:0; }
  .tab { flex:1; padding:11px 4px; text-align:center; font-size:11px; font-weight:500; color:var(--ink-light); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; font-family:'Playfair Display',serif; }
  .tab.active.rose-tab { color:var(--rose); border-bottom-color:var(--rose); }
  .tab.active.sage-tab { color:var(--sage); border-bottom-color:var(--sage); }
  .tab.active.gold-tab { color:var(--gold); border-bottom-color:var(--gold); }
  .tab.active.ink-tab { color:var(--ink); border-bottom-color:var(--ink); }
  .panels { flex:1; overflow:hidden; position:relative; }
  .panel { position:absolute; inset:0; display:flex; flex-direction:column; overflow:hidden; opacity:0; pointer-events:none; transition:opacity 0.15s; }
  .panel.active { opacity:1; pointer-events:all; }
  .panel-header { padding:12px 16px 10px; border-bottom:1px solid rgba(44,36,22,0.08); display:flex; align-items:center; justify-content:space-between; background:white; flex-shrink:0; }
  .panel-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; }
  .panel-title.rose { color:var(--rose); } .panel-title.sage { color:var(--sage); } .panel-title.gold { color:var(--gold); }
  .add-btn { padding:6px 12px; border:none; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .rose-btn { background:var(--rose); color:white; } .sage-btn { background:var(--sage); color:white; }
  .panel-body { flex:1; overflow-y:auto; padding:12px 14px; -webkit-overflow-scrolling:touch; }
  .filter-row { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
  .filter-chip { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:500; cursor:pointer; border:1.5px solid transparent; transition:all 0.15s; background:var(--warm); color:var(--ink-light); }
  .filter-chip.active { background:var(--ink); color:var(--cream); }
  .task-item { background:white; border-radius:10px; margin-bottom:7px; border:1.5px solid transparent; transition:all 0.2s; overflow:hidden; }
  .task-item.done > .task-row { opacity:0.55; }
  .task-row { display:flex; gap:9px; padding:11px 11px 9px; align-items:flex-start; }
  .task-priority { width:4px; border-radius:2px; align-self:stretch; flex-shrink:0; margin-top:2px; min-height:18px; }
  .priority-high { background:var(--rose); } .priority-med { background:var(--gold); } .priority-low { background:var(--sage); }
  .task-check { width:20px; height:20px; border-radius:5px; border:2px solid #ccc; flex-shrink:0; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:12px; color:white; margin-top:1px; }
  .task-check.checked-rose { background:var(--rose); border-color:var(--rose); }
  .task-check.checked-sage { background:var(--sage); border-color:var(--sage); }
  .task-check.checked-gold { background:var(--gold); border-color:var(--gold); }
  .task-content { flex:1; min-width:0; }
  .task-text { font-size:13px; color:var(--ink); line-height:1.4; margin-bottom:4px; }
  .task-item.done .task-text { text-decoration:line-through; color:var(--ink-light); }
  .task-meta { display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
  .tag { font-size:10px; padding:2px 6px; border-radius:8px; font-weight:500; }
  .tag-rose { background:rgba(201,123,110,0.15); color:var(--rose); }
  .tag-sage { background:rgba(122,158,126,0.15); color:var(--sage); }
  .tag-gold { background:rgba(196,146,74,0.15); color:var(--gold); }
  .task-date-tag { font-size:10px; color:var(--ink-light); }
  .task-actions-row { display:flex; align-items:center; gap:8px; padding:0 11px 9px 43px; }
  .subtask-toggle { font-size:11px; color:var(--ink-light); cursor:pointer; display:flex; align-items:center; gap:3px; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0; }
  .add-subtask-btn { font-size:11px; color:var(--rose); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; padding:0; margin-left:auto; }
  .subtask-list { display:none; }
  .subtask-list.open { display:block; }
  .subtask-item { padding:4px 0; }
  .subtask-row { display:flex; align-items:flex-start; gap:6px; padding:6px 7px; border-radius:7px; background:var(--cream); border-left:2px solid var(--warm); }
  .subtask-item.done-sub .subtask-text { text-decoration:line-through; color:var(--ink-light); }
  .subtask-check { width:16px; height:16px; border-radius:4px; border:2px solid #ccc; flex-shrink:0; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:9px; color:white; margin-top:1px; }
  .subtask-check.checked-rose { background:var(--rose); border-color:var(--rose); }
  .subtask-check.checked-sage { background:var(--sage); border-color:var(--sage); }
  .subtask-check.checked-gold { background:var(--gold); border-color:var(--gold); }
  .subtask-content { flex:1; min-width:0; cursor:pointer; }
  .subtask-text { font-size:12px; color:var(--ink); line-height:1.4; margin-bottom:2px; }
  .subtask-meta { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
  .subtask-date { font-size:10px; color:var(--ink-light); }
  .sub-caret { font-size:10px; color:var(--ink-light); cursor:pointer; width:12px; flex-shrink:0; text-align:center; margin-top:2px; user-select:none; }
  .sub-caret.hidden { visibility:hidden; }
  .subtask-actions { display:flex; gap:1px; flex-shrink:0; }
  .subtask-edit-btn { font-size:11px; cursor:pointer; color:var(--ink-light); background:none; border:none; padding:0 2px; }
  .subtask-children { padding-left:16px; margin-top:2px; }
  .voz-recording-hint { text-align:center; font-size:13px; color:var(--rose); padding:8px; font-weight:500; }
  .voz-card { background:white; border-radius:10px; margin-bottom:12px; overflow:hidden; border:1.5px solid transparent; }
  .voz-card-head { padding:11px 12px; display:flex; align-items:center; gap:9px; }
  .voz-audio { width:calc(100% - 26px); height:34px; margin:0 13px 9px; }
  .voz-date { font-size:10px; color:var(--ink-light); }
  .voz-title { font-size:12px; font-weight:500; flex:1; }
  .voz-del { width:26px; height:26px; border:none; border-radius:6px; background:var(--warm); cursor:pointer; font-size:12px; color:var(--ink-light); flex-shrink:0; }
  .voz-tasks-section { padding:0 12px 11px; }
  .voz-tasks-label { font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-light); margin-bottom:5px; }
  .voz-task-chip { display:flex; align-items:center; gap:6px; padding:6px 8px; background:var(--cream); border-radius:7px; margin-bottom:4px; font-size:12px; }
  .voz-add-row { display:flex; gap:5px; margin-top:5px; }
  .voz-add-input { flex:1; padding:7px 9px; border:1.5px solid rgba(44,36,22,0.12); border-radius:7px; font-family:'DM Sans',sans-serif; font-size:12px; outline:none; }
  .voz-add-input:focus { border-color:var(--rose); }
  .voz-add-btn { padding:7px 10px; border:none; border-radius:7px; background:var(--rose); color:white; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .note-card { background:white; border-radius:10px; margin-bottom:10px; border:1.5px solid transparent; overflow:hidden; }
  .note-card.done-note .note-title { text-decoration:line-through; color:var(--ink-light); }
  .note-header { padding:12px 12px 7px; display:flex; align-items:flex-start; gap:9px; }
  .note-check { width:20px; height:20px; border-radius:5px; border:2px solid #ccc; flex-shrink:0; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:12px; color:white; margin-top:1px; }
  .note-check.checked-rose { background:var(--rose); border-color:var(--rose); }
  .note-check.checked-sage { background:var(--sage); border-color:var(--sage); }
  .note-check.checked-gold { background:var(--gold); border-color:var(--gold); }
  .note-title-wrap { flex:1; min-width:0; }
  .note-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; line-height:1.3; }
  .note-actions { display:flex; gap:3px; flex-shrink:0; }
  .note-action-btn { width:26px; height:26px; border:none; border-radius:6px; background:var(--warm); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; color:var(--ink-light); }
  .note-body { padding:0 12px 10px; font-size:12px; color:var(--ink-light); line-height:1.6; white-space:pre-wrap; }
  .note-list-item { display:flex; align-items:center; gap:7px; padding:4px 12px; font-size:12px; color:var(--ink-light); }
  .note-list-item.checked-item .note-list-text { text-decoration:line-through; opacity:0.55; }
  .note-list-check { width:16px; height:16px; border-radius:4px; border:2px solid #ccc; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:9px; color:white; transition:all 0.15s; }
  .note-list-check.checked { background:var(--sage); border-color:var(--sage); }
  .note-list-text { flex:1; }
  .note-list-badge { font-size:10px; padding:1px 5px; border-radius:6px; background:rgba(44,36,22,0.07); color:var(--ink-light); }
  .note-mode-toggle { display:flex; border:1.5px solid rgba(44,36,22,0.14); border-radius:8px; overflow:hidden; margin-bottom:10px; }
  .note-mode-btn { flex:1; padding:7px 0; font-size:12px; font-weight:500; font-family:'DM Sans',sans-serif; border:none; background:none; cursor:pointer; color:var(--ink-light); transition:all 0.15s; }
  .note-mode-btn.active { background:var(--ink); color:var(--cream); }
  .list-editor { display:flex; flex-direction:column; gap:4px; }
  .list-editor-item { display:flex; align-items:center; gap:6px; background:white; border:1.5px solid rgba(44,36,22,0.1); border-radius:8px; padding:4px 8px; }
  .list-editor-item input { flex:1; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); background:transparent; padding:4px 0; }
  .list-editor-del { width:22px; height:22px; border:none; background:none; cursor:pointer; color:var(--ink-light); font-size:13px; flex-shrink:0; display:flex; align-items:center; justify-content:center; border-radius:4px; }
  .list-editor-drag { color:var(--ink-light); font-size:13px; cursor:grab; padding:0 2px; }
  .list-add-btn { display:flex; align-items:center; gap:6px; padding:7px 4px; font-size:12px; color:var(--rose); background:none; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .note-footer { padding:6px 12px; background:var(--cream); display:flex; align-items:center; justify-content:space-between; font-size:10px; color:var(--ink-light); }
  .note-authors { display:flex; gap:3px; align-items:center; }
  .author-dot { width:14px; height:14px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; color:white; }
  .author-rose { background:var(--rose); } .author-sage { background:var(--sage); }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-nav { width:30px; height:30px; border:none; border-radius:8px; background:var(--warm); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }
  .cal-month { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:12px; }
  .cal-dow { text-align:center; font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-light); padding:3px 0 6px; }
  .cal-day { min-height:38px; border-radius:7px; padding:3px; position:relative; cursor:pointer; transition:background 0.1s; }
  .cal-day:hover { background:rgba(44,36,22,0.05); }
  .cal-day.other-month { opacity:0.3; }
  .cal-day.today { background:rgba(201,123,110,0.12); }
  .cal-day.selected { background:var(--rose) !important; }
  .cal-day.selected .cal-day-num { color:white; }
  .cal-day-num { font-size:12px; font-weight:500; line-height:1; margin-bottom:2px; }
  .cal-dot-row { display:flex; gap:2px; flex-wrap:wrap; }
  .cal-dot { width:4px; height:4px; border-radius:50%; }
  .cal-dot.rose { background:var(--rose); } .cal-dot.sage { background:var(--sage); } .cal-dot.gold { background:var(--gold); }
  .cal-event-item { display:flex; gap:9px; align-items:center; padding:9px 11px; background:white; border-radius:8px; margin-bottom:6px; border-left:3px solid var(--rose); }
  .cal-event-item.cata { border-left-color:var(--sage); }
  .cal-event-item.juntos { border-left-color:var(--gold); }
  .cal-event-item.subtask-ev { border-left-style:dashed; opacity:0.85; }
  .cal-ev-edit { width:26px; height:26px; border:none; border-radius:6px; background:var(--warm); cursor:pointer; font-size:12px; flex-shrink:0; color:var(--ink-light); display:flex; align-items:center; justify-content:center; }
  .cal-add-task-btn { display:flex; align-items:center; justify-content:center; gap:5px; width:100%; padding:9px; border:1.5px dashed rgba(44,36,22,0.18); border-radius:8px; background:none; font-family:"DM Sans",sans-serif; font-size:12px; color:var(--rose); cursor:pointer; margin-top:4px; }
  .cal-events-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
  .cal-events-title { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-light); }
  .cal-event-name { font-size:12px; color:var(--ink); flex:1; }
  .cal-event-meta { font-size:10px; color:var(--ink-light); }
  .cal-event-parent { font-size:10px; color:var(--ink-light); font-style:italic; }
  .no-events { text-align:center; padding:20px; color:var(--ink-light); font-size:12px; }
  .menu-item { display:flex; align-items:center; gap:10px; padding:10px 11px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink); transition:all 0.15s; }
  .menu-item:active { background:rgba(44,36,22,0.06); }
  .menu-item.active { background:var(--ink); color:var(--cream); }
  .menu-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-light); padding:0 8px; margin-bottom:4px; }
  .menu-section { margin-bottom:6px; }
  .divider { height:1px; background:rgba(44,36,22,0.07); margin:8px 0; }
  .progress-card { padding:12px 14px; background:white; border-radius:10px; border:1px solid rgba(44,36,22,0.08); margin-top:8px; }
  .progress-label { font-size:12px; color:var(--ink-light); margin-bottom:7px; display:flex; justify-content:space-between; }
  .progress-track { height:6px; background:var(--warm); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--rose),var(--gold)); border-radius:3px; transition:width 0.5s ease; }
  .settings-btn { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--ink-light); margin-top:8px; border:1.5px dashed rgba(44,36,22,0.15); transition:all 0.15s; }
  .modal-overlay { position:fixed; inset:0; background:rgba(44,36,22,0.5); display:flex; align-items:flex-end; justify-content:center; z-index:200; backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--cream); border-radius:20px 20px 0 0; padding:20px 20px 32px; width:100%; max-width:560px; max-height:92dvh; overflow-y:auto; transform:translateY(20px); transition:transform 0.25s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-handle { width:36px; height:4px; background:rgba(44,36,22,0.15); border-radius:2px; margin:0 auto 16px; }
  .modal-title { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:16px; }
  .form-group { margin-bottom:13px; }
  .form-label { display:block; font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-light); margin-bottom:5px; }
  .form-input, .form-textarea, .form-select { width:100%; padding:10px 12px; background:white; border:1.5px solid rgba(44,36,22,0.12); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color 0.15s; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color:var(--rose); }
  .form-textarea { min-height:80px; resize:vertical; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-actions { display:flex; gap:9px; justify-content:flex-end; margin-top:16px; }
  .btn-cancel { padding:8px 15px; border:1.5px solid rgba(44,36,22,0.2); border-radius:8px; background:none; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; color:var(--ink-light); }
  .btn-save { padding:8px 18px; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; }
  .rose-save { background:var(--rose); color:white; } .sage-save { background:var(--sage); color:white; }
  .empty-state { text-align:center; padding:32px 20px; color:var(--ink-light); }
  .empty-state .es-icon { font-size:28px; margin-bottom:9px; }
  ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:var(--warm); border-radius:2px; }
</style>
</head>
<body>

<header>
  <div class="logo" id="logo-btn">nosotros <span>&#9825;</span></div>
  <div class="header-users">
    <div class="user-tag juan active" id="userJuan" onclick="switchUser('juan')">
      <span class="user-dot"></span><span id="name-juan">Juan</span>
    </div>
    <div class="user-tag cata" id="userCata" onclick="switchUser('cata')">
      <span class="user-dot"></span><span id="name-cata">Cata</span>
    </div>
  </div>
</header>

<div class="main">
  <div class="tab-bar">
    <div class="tab rose-tab active" id="tab-tareas" onclick="switchTab('tareas')">&#128203; Tareas</div>
    <div class="tab sage-tab" id="tab-notas" onclick="switchTab('notas')">&#128221; Notas</div>
    <div class="tab gold-tab" id="tab-calendario" onclick="switchTab('calendario')">&#128197; Cal.</div>
    <div class="tab rose-tab" id="tab-voz" onclick="switchTab('voz')">&#127908; Voz</div>
    <div class="tab ink-tab" id="tab-menu" onclick="switchTab('menu')">&#9776;</div>
  </div>

  <div class="panels">
    <div class="panel active" id="panel-tareas">
      <div class="panel-header">
        <div class="panel-title rose">Tareas</div>
        <button class="add-btn rose-btn" onclick="openTaskModal()">+ Nueva</button>
      </div>
      <div class="panel-body">
        <div class="filter-row">
          <div class="filter-chip active" onclick="setAssigneeFilter('todos',this)">Todos</div>
          <div class="filter-chip" onclick="setAssigneeFilter('juan',this)">Juan</div>
          <div class="filter-chip" onclick="setAssigneeFilter('cata',this)">Cata</div>
          <div class="filter-chip" onclick="setAssigneeFilter('juntos',this)">J&amp;C</div>
        </div>
        <div id="task-list"></div>
      </div>
    </div>

    <div class="panel" id="panel-notas">
      <div class="panel-header">
        <div class="panel-title sage">Notas</div>
        <button class="add-btn sage-btn" onclick="openNoteModal()">+ Nueva</button>
      </div>
      <div class="panel-body" id="notes-list"></div>
    </div>

    <div class="panel" id="panel-calendario">
      <div class="panel-header"><div class="panel-title gold">Calendario</div></div>
      <div class="panel-body" id="cal-body"></div>

      { id:90092, text:'Limpiar el interior con paño húmedo', assignee:'juntos', date:'', done:false, subtasks:[] },

      { id:90101, text:'Limpiar teclados y mouses', assignee:'juan', date:'', done:false, subtasks:[] },

    ]},

if (tasks.length === 0) {
  tasks = [
    { id:1, text:'Pagar el arriendo', assignee:'juan', priority:'high', category:'pagos', date:'', done:false, subtasks:[], created:new Date().toISOString() },

}

function save() {
  localStorage.setItem('nosotros_tasks', JSON.stringify(tasks));
  localStorage.setItem('nosotros_notes', JSON.stringify(notes));
  localStorage.setItem('nosotros_name_juan', nameJuan);
  localStorage.setItem('nosotros_name_cata', nameCata);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'calendario') renderCalendar();
  if (tab === 'voz') renderVoz();
}

function switchUser(u) {
  currentUser = u;
  document.getElementById('userJuan').classList.toggle('active', u === 'juan');
  document.getElementById('userCata').classList.toggle('active', u === 'cata');
  renderTasks();
}

function displayName(a) {
  if (a === 'juan') return nameJuan;
  if (a === 'cata') return nameCata;
  return 'J&C';
}

function updateNames() {
  document.getElementById('name-juan').textContent = nameJuan;
  document.getElementById('name-cata').textContent = nameCata;
}

function setView(v) {
  viewFilter = v; categoryFilter = null;
  document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-' + v)?.classList.add('active');
  switchTab('tareas'); renderTasks();
}
function filterCategoryMenu(cat) {
  categoryFilter = cat; viewFilter = 'todas';
  document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('active'));
  switchTab('tareas'); renderTasks();
}
function setAssigneeFilter(f, el) {
  assigneeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}
function nodeOrDescendantHasAssignee(node, who) {
  if (node.assignee === who) return true;
  return (node.subtasks || []).some(s => nodeOrDescendantHasAssignee(s, who));
}
function getFilteredTasks() {
  return tasks.filter(t => {
    if (viewFilter === 'pendientes' && t.done) return false;
    if (viewFilter === 'completadas' && !t.done) return false;
    if (categoryFilter && t.category !== categoryFilter) return false;
    if (assigneeFilter !== 'todos' && !nodeOrDescendantHasAssignee(t, assigneeFilter)) return false;
    return true;
  });
}

function assigneeColorClass(a) {
  return a === 'cata' ? 'sage' : a === 'juntos' ? 'gold' : 'rose';
}

function countSubtree(nodes) {
  let total = 0, done = 0;
  (nodes || []).forEach(n => {
    total++; if (n.done) done++;
    const r = countSubtree(n.subtasks); total += r.total; done += r.done;
  });
  return { total, done };
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const filtered = getFilteredTasks();
  if (!filtered.length) { list.innerHTML = '<div class="empty-state"><div class="es-icon">📭</div><p>No hay tareas aquí</p></div>'; return; }
  list.innerHTML = filtered.map(t => renderTaskHTML(t)).join('');
}

function renderTaskHTML(t) {
  const subs = t.subtasks || [];
  const cnt = countSubtree(subs);
  const checkClass = t.done ? 'checked-' + assigneeColorClass(t.assignee) : '';
  const assigneeClass = assigneeColorClass(t.assignee);
  const childrenHTML = subs.map(s => renderSubtaskHTML(s)).join('');
  const hasSubs = subs.length > 0;
  return `<div class="task-item ${t.done?'done':''}" id="task-${t.id}">
    <div class="task-row">
      <div class="task-priority priority-${t.priority}"></div>
      <div class="task-check ${checkClass}" onclick="toggleNode('${t.id}',event)">${t.done?'✓':''}</div>
      <div class="task-content" onclick="editTask(${t.id})">
        <div class="task-text">${t.text}</div>
        <div class="task-meta">
          <span class="tag tag-${assigneeClass}">${displayName(t.assignee)}</span>
          ${t.date?`<span class="task-date-tag">📅 ${fmtDate(t.date)}</span>`:''}
          ${(t.recurrence&&t.recurrence!=='none')?`<span class="task-date-tag">🔁 ${recurrenceLabel[t.recurrence]||''}</span>`:''}
        </div>
      </div>
    </div>
    <div class="task-actions-row">
      ${hasSubs?`<button class="subtask-toggle" onclick="toggleSubtaskList(${t.id})"><span id="sub-arrow-${t.id}">▸</span> ${cnt.done}/${cnt.total}</button>`:`<span style="font-size:11px;color:var(--ink-light)">Sin subtareas</span>`}
      <button class="add-subtask-btn" onclick="openSubtaskModal('${t.id}')">+ subtarea</button>
    </div>
    <div class="subtask-list" id="subtask-list-${t.id}">${childrenHTML}</div>
  </div>`;
}

function renderSubtaskHTML(s) {
  const checkClass = s.done ? 'checked-' + assigneeColorClass(s.assignee) : '';
  const assigneeClass = assigneeColorClass(s.assignee);
  const kids = s.subtasks || [];
  const hasKids = kids.length > 0;
  const cnt = countSubtree(kids);
  const childrenHTML = kids.map(k => renderSubtaskHTML(k)).join('');
  return `<div class="subtask-item ${s.done?'done-sub':''}" id="subtask-${s.id}">
    <div class="subtask-row">
      <span class="sub-caret ${hasKids?'':'hidden'}" id="caret-${s.id}" onclick="toggleSubtaskList('${s.id}')">▸</span>
      <div class="subtask-check ${checkClass}" onclick="toggleNode('${s.id}',event)">${s.done?'✓':''}</div>
      <div class="subtask-content" onclick="editSubtaskById('${s.id}')">
        <div class="subtask-text">${s.text}</div>
        <div class="subtask-meta">
          <span class="tag tag-${assigneeClass}" style="font-size:9px;padding:1px 5px">${displayName(s.assignee)}</span>
          ${s.date?`<span class="subtask-date">📅 ${fmtDate(s.date)}</span>`:''}
          ${hasKids?`<span class="subtask-date">· ${cnt.done}/${cnt.total}</span>`:''}
        </div>
      </div>
      <div class="subtask-actions">
        <button class="subtask-edit-btn" onclick="openSubtaskModal('${s.id}')" title="Agregar">➕</button>
        <button class="subtask-edit-btn" onclick="editSubtaskById('${s.id}')" title="Editar">✏️</button>
        <button class="subtask-edit-btn" onclick="deleteNode('${s.id}')" title="Eliminar">🗑️</button>
      </div>
    </div>
    <div class="subtask-children subtask-list" id="subtask-list-${s.id}">${childrenHTML}</div>
  </div>`;
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]}`;
}

function toggleSubtaskList(id) {
  const el = document.getElementById('subtask-list-' + id);
  if (!el) return;
  const open = el.classList.toggle('open');
  const arrow = document.getElementById('sub-arrow-' + id);
  if (arrow) arrow.textContent = open ? '▾' : '▸';
  const caret = document.getElementById('caret-' + id);
  if (caret) caret.textContent = open ? '▾' : '▸';
}

function findNode(id, nodes) {
  nodes = nodes || tasks;
  for (const n of nodes) {
    if (String(n.id) === String(id)) return n;
    if (n.subtasks) { const found = findNode(id, n.subtasks); if (found) return found; }
  }
  return null;
}
function removeNode(id, nodes) {
  nodes = nodes || tasks;
  for (let i = 0; i < nodes.length; i++) {
    if (String(nodes[i].id) === String(id)) { nodes.splice(i,1); return true; }
    if (nodes[i].subtasks && removeNode(id, nodes[i].subtasks)) return true;
  }
  return false;
}
function toggleNode(id, e) {
  if (e) e.stopPropagation();
  const n = findNode(id);
  if (n) { n.done = !n.done; save(); renderTasks(); updateProgress(); }
}
function deleteNode(id) {
  if (!confirm('¿Eliminar esto y todas sus subtareas?')) return;
  removeNode(id); save(); renderTasks(); updateProgress();
}

function onRecurrenceChange() {
  const val = document.getElementById('task-recurrence-input').value;
  document.getElementById('recurrence-end-group').style.display = (val === 'none') ? 'none' : 'block';
}
function openTaskModal() {
  editingTaskId = null;
  document.getElementById('task-modal-title').textContent = 'Nueva tarea';
  document.getElementById('task-text-input').value = '';
  document.getElementById('task-assignee-input').value = currentUser;
  document.getElementById('task-priority-input').value = 'med';
  document.getElementById('task-category-input').value = 'hogar';
  document.getElementById('task-date-input').value = '';
  document.getElementById('task-recurrence-input').value = 'none';

function editTask(id) {
  const t = findNode(id);

  document.getElementById('task-modal-title').textContent = 'Editar tarea';
  document.getElementById('task-text-input').value = t.text;

  onRecurrenceChange();

function saveTask() {
  const text = document.getElementById('task-text-input').value.trim();
  if (!text) return;
  const assignee = document.getElementById('task-assignee-input').value;
  const priority = document.getElementById('task-priority-input').value;
  const category = document.getElementById('task-category-input').value;
  const date = document.getElementById('task-date-input').value;

  const recurrenceEnd = document.getElementById('task-recurrence-end-input').value;
  if (editingTaskId) {

  } else {
    tasks.unshift({ id:Date.now(), text, assignee, priority, category, date, recurrence, recurrenceEnd, done:false, subtasks:[], created:new Date().toISOString() });
  }
  save(); renderTasks(); updateProgress(); closeModals();
  if (typeof _afterSaveCallback === 'function') { const cb = _afterSaveCallback; _afterSaveCallback = null; cb(); }
}
let _afterSaveCallback = null;

const recurrenceLabel = { daily:'cada día', weekly:'cada semana', biweekly:'cada 2 semanas', monthly:'cada mes', yearly:'cada año' };
function recurrenceDatesInRange(task, rangeStart, rangeEnd) {
  const out = [];
  if (!task.date || !task.recurrence || task.recurrence === 'none') return out;
  let cur = parseLocalDate(task.date);
  const hardEnd = task.recurrenceEnd ? parseLocalDate(task.recurrenceEnd) : null;
  let guard = 0;
  while (cur <= rangeEnd && guard < 1000) {
    guard++;
    if (hardEnd && cur > hardEnd) break;
    if (cur >= rangeStart) out.push(toDateStr(cur));
    cur = advanceDate(cur, task.recurrence);
  }
  return out;
}
function advanceDate(d, rec) {
  const n = new Date(d);
  if (rec === 'daily') n.setDate(n.getDate()+1);
  else if (rec === 'weekly') n.setDate(n.getDate()+7);
  else if (rec === 'biweekly') n.setDate(n.getDate()+14);
  else if (rec === 'monthly') n.setMonth(n.getMonth()+1);
  else if (rec === 'yearly') n.setFullYear(n.getFullYear()+1);
  else n.setDate(n.getDate()+1);
  return n;
}
function parseLocalDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function toDateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function saveSubtask() {
  const text = document.getElementById('subtask-text-input').value.trim();

    parent.subtasks.push({ id:Date.now(), text, assignee, date, done:false, subtasks:[] });

let noteMode = 'text';
let listItems = [];
function setNoteMode(mode) {
  noteMode = mode;
  document.getElementById('mode-btn-text').classList.toggle('active', mode === 'text');
  document.getElementById('mode-btn-list').classList.toggle('active', mode === 'list');
  document.getElementById('note-text-section').style.display = mode === 'text' ? '' : 'none';
  document.getElementById('note-list-section').style.display = mode === 'list' ? '' : 'none';

}
function renderListEditor() {
  const el = document.getElementById('list-editor');
  if (!el) return;
  el.innerHTML = listItems.map((item,i) => `
    <div class="list-editor-item">
      <span class="list-editor-drag">⠿</span>
      <input type="text" value="${item.text.replace(/"/g,'&quot;')}" placeholder="Ítem ${i+1}"
        oninput="listItems[${i}].text=this.value"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addListEditorItem(${i+1})}">

}
function addListEditorItem(atIndex) {
  const idx = (atIndex !== undefined) ? atIndex : listItems.length;
  listItems.splice(idx, 0, { text:'', checked:false });
  renderListEditor();
  setTimeout(() => {
    const inputs = document.getElementById('list-editor').querySelectorAll('input');
    if (inputs[idx]) inputs[idx].focus();
  }, 30);
}
function removeListItem(i) { listItems.splice(i,1); renderListEditor(); }
function toggleListItem(noteId, idx) {
  const n = notes.find(x => x.id === noteId);
  if (n && n.items) { n.items[idx].checked = !n.items[idx].checked; save(); renderNotes(); }
}
function noteAuthorLabel(a) {
  if (a === 'juan') return nameJuan;
  if (a === 'cata') return nameCata;
  return 'J C';
}
function renderNotes() {
  const list = document.getElementById('notes-list');
  if (!notes.length) { list.innerHTML = '<div class="empty-state"><div class="es-icon">📝</div><p>No hay notas</p></div>'; return; }
  list.innerHTML = notes.map(n => {
    const checkClass = n.done ? (n.authors==='cata'?'checked-sage':n.authors==='jc'?'checked-gold':'checked-rose') : '';
    let bodyHTML = '';
    if (n.mode === 'list' && Array.isArray(n.items)) {

        </div>`).join('') +

    } else {

    }
    return `<div class="note-card ${n.done?'done-note':''}">

      <div class="note-footer">

          <span style="margin-left:3px">${noteAuthorLabel(n.authors)}</span>

function toggleNote(id) { const n = notes.find(x => x.id===id); if (n) { n.done=!n.done; save(); renderNotes(); } }
function openNoteModal() {
  editingNoteId = null; noteMode = 'text'; listItems = [];
  document.getElementById('note-modal-title').textContent = 'Nueva nota';
  document.getElementById('note-title-input').value = '';
  document.getElementById('note-body-input').value = '';
  document.getElementById('note-authors-input').value = 'jc';
  setNoteMode('text');
  document.getElementById('note-modal').classList.add('open');
}
function editNote(id) {
  const n = notes.find(x => x.id===id);
  if (!n) return;
  editingNoteId = id;
  document.getElementById('note-modal-title').textContent = 'Editar nota';
  document.getElementById('note-title-input').value = n.title;
  document.getElementById('note-authors-input').value = n.authors;
  if (n.mode==='list' && Array.isArray(n.items)) {
    noteMode = 'list'; listItems = n.items.map(it => ({...it})); setNoteMode('list');
  } else {
    noteMode = 'text'; listItems = [];
    document.getElementById('note-body-input').value = n.body || '';
    setNoteMode('text');
  }
  document.getElementById('note-modal').classList.add('open');
}
function saveNote() {
  const title = document.getElementById('note-title-input').value.trim();
  if (!title) return;
  const authors = document.getElementById('note-authors-input').value;
  let noteData;
  if (noteMode === 'list') {
    const items = listItems.filter(it => it.text.trim());
    const bodyStr = items.map(it => (it.checked?'\u2713 ':'\u2022 ') + it.text).join('\n');
    noteData = { title, authors, mode:'list', items, body:bodyStr };
  } else {
    const body = document.getElementById('note-body-input').value.trim();
    noteData = { title, authors, mode:'text', body, items:[] };
  }
  if (editingNoteId) {
    const n = notes.find(x => x.id===editingNoteId);
    Object.assign(n, noteData);
  } else {
    notes.unshift({ id:Date.now(), done:false, created:new Date().toISOString(), ...noteData });
  }
  save(); renderNotes(); closeModals();
}
function deleteNote(id) {
  if (!confirm('¿Eliminar esta nota?')) return;
  notes = notes.filter(x => x.id !== id); save(); renderNotes();
}

function updateProgress() {
  const r = countSubtree(tasks);
  const pct = r.total===0 ? 0 : Math.round((r.done/r.total)*100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

let selectedCalDate = null;
function renderCalendar() {
  const body = document.getElementById('cal-body');
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const today = new Date();
  const eventsMap = {};
  function addEvent(dateStr, ev) { if (!dateStr) return; if (!eventsMap[dateStr]) eventsMap[dateStr]=[]; eventsMap[dateStr].push(ev); }
  const rangeStart = new Date(year,month,1);
  const rangeEnd = new Date(year,month+1,0);
  function walkEvents(nodes, parentText, depth) {
    (nodes||[]).forEach(n => {
      if (n.date) {
        if (n.recurrence && n.recurrence!=='none') {
          recurrenceDatesInRange(n,rangeStart,rangeEnd).forEach(ds => addEvent(ds, { id:n.id, text:n.text, assignee:n.assignee, isSubtask:depth>0, parentText, done:n.done, recurring:true }));
        } else {
          addEvent(n.date, { id:n.id, text:n.text, assignee:n.assignee, isSubtask:depth>0, parentText, done:n.done });
        }
      }
      if (n.subtasks) walkEvents(n.subtasks, n.text, depth+1);
    });
  }
  walkEvents(tasks, null, 0);
  const firstDay = new Date(year,month,1);
  const startDow = (firstDay.getDay()+6)%7;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const selStr = selectedCalDate;
  let daysHTML = '';
  for (let i=0;i<startDow;i++) { const d=new Date(year,month,-startDow+i+1); daysHTML+=`<div class="cal-day other-month"><div class="cal-day-num">${d.getDate()}</div></div>`; }
  for (let d=1;d<=daysInMonth;d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const isSel = selStr===dateStr;
    const evs = eventsMap[dateStr]||[];
    const dots = evs.slice(0,4).map(e => { const c=e.assignee==='cata'?'sage':e.assignee==='juntos'?'gold':'rose'; return `<div class="cal-dot ${c}"></div>`; }).join('');
    daysHTML += `<div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectCalDay('${dateStr}')"><div class="cal-day-num">${d}</div><div class="cal-dot-row">${dots}</div></div>`;
  }
  const showDate = selStr || `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const showEvs = eventsMap[showDate]||[];
  const [sy,sm,sd] = showDate.split('-');
  const monthsShort = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const fmtShow = `${parseInt(sd)} ${monthsShort[parseInt(sm)-1]}`;
  let eventsHTML = showEvs.map(e => {
    const cls = e.assignee==='cata'?'cata':e.assignee==='juntos'?'juntos':'';
    const subCls = e.isSubtask?'subtask-ev':'';
    const editFn = e.isSubtask?`editSubtaskById(${e.id})`:`editTask(${e.id})`;
    return `<div class="cal-event-item ${cls} ${subCls}">
      <div style="flex:1;min-width:0">
        <div class="cal-event-name" style="${e.done?'text-decoration:line-through;opacity:0.6':''}">${e.recurring?'🔁 ':''}${e.text}</div>
        ${e.isSubtask?`<div class="cal-event-parent">↳ ${e.parentText}</div>`:''}
        <div class="cal-event-meta">${displayName(e.assignee)}</div>
      </div>
      ${e.done?'<span style="font-size:13px;flex-shrink:0">✅</span>':''}
      <button class="cal-ev-edit" onclick="${editFn}" title="Editar">✏️</button>
    </div>`;
  }).join('');
  if (!showEvs.length) eventsHTML = `<div class="no-events">Sin tareas para este día</div>`;
  body.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">&#8249;</button>
      <div class="cal-month">${monthNames[month]} ${year}</div>
      <button class="cal-nav" onclick="calNext()">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">Lu</div><div class="cal-dow">Ma</div><div class="cal-dow">Mi</div>
      <div class="cal-dow">Ju</div><div class="cal-dow">Vi</div><div class="cal-dow">Sá</div><div class="cal-dow">Do</div>
      ${daysHTML}
    </div>
    <div class="cal-events">
      <div class="cal-events-header">
        <div class="cal-events-title">${fmtShow}</div>
        <button class="add-btn rose-btn" style="padding:4px 10px;font-size:11px" onclick="openTaskModalForDate('${showDate}')">+ Tarea</button>
      </div>
      ${eventsHTML}
      <button class="cal-add-task-btn" onclick="openTaskModalForDate('${showDate}')">＋ Agregar tarea el ${fmtShow}</button>
    </div>`;
}
function selectCalDay(dateStr) { selectedCalDate = selectedCalDate===dateStr?null:dateStr; renderCalendar(); }
function openTaskModalForDate(dateStr) {
  editingTaskId = null;
  document.getElementById('task-modal-title').textContent = 'Nueva tarea';
  document.getElementById('task-text-input').value = '';

let voiceNotes = JSON.parse(localStorage.getItem('nosotros_voice') || '[]');
let mediaRecorder = null, recChunks = [], isRecording = false;
function saveVoice() { localStorage.setItem('nosotros_voice', JSON.stringify(voiceNotes)); }
async function toggleRecording() {
  const btn = document.getElementById('rec-btn');
  if (isRecording) { mediaRecorder.stop(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { alert('Tu navegador no permite grabar audio aquí.'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size>0) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recChunks, { type:'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        voiceNotes.unshift({ id:Date.now(), audio:reader.result, created:new Date().toISOString(), derivedTasks:[] });
        saveVoice(); renderVoz();
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
      isRecording = false;
      btn.innerHTML = '\u25C9 Grabar';
      btn.style.background = 'var(--rose)';
    };
    mediaRecorder.start();
    isRecording = true;
    btn.innerHTML = '\u25A0 Detener';
    btn.style.background = '#a33';
  } catch (err) { alert('No se pudo acceder al micrófono. Revisa los permisos.'); }
}
function renderVoz() {
  const body = document.getElementById('voz-body');
  let html = '';
  if (isRecording) html += '<div class="voz-recording-hint">\u25CF Grabando...</div>';
  if (!voiceNotes.length) { html += '<div class="empty-state"><div class="es-icon">🎤</div><p>Graba una nota de voz y anota las tareas que surjan de ella</p></div>'; body.innerHTML = html; return; }
  html += voiceNotes.map(v => {
    const tasksHTML = (v.derivedTasks||[]).map(dt => `<div class="voz-task-chip"><span style="flex:1">\u2022 ${dt.text}</span><span class="tag tag-${assigneeColorClass(dt.assignee)}" style="font-size:9px;padding:1px 5px">${displayName(dt.assignee)}</span></div>`).join('');
    return `<div class="voz-card">
      <div class="voz-card-head">
        <span style="font-size:17px">🎧</span>
        <div class="voz-title">Nota de voz <span class="voz-date">· ${new Date(v.created).toLocaleString('es-CL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>
        <button class="voz-del" onclick="deleteVoice(${v.id})">🗑️</button>
      </div>
      <audio class="voz-audio" controls src="${v.audio}"></audio>
      <div class="voz-tasks-section">
        <div class="voz-tasks-label">Tareas de este audio</div>
        ${tasksHTML||'<div style="font-size:11px;color:var(--ink-light);margin-bottom:5px">Sin tareas anotadas aún</div>'}
        <div class="voz-add-row">
          <input class="voz-add-input" id="voz-input-${v.id}" placeholder="Escribe una tarea del audio..." onkeydown="if(event.key==='Enter')addVoiceTask(${v.id})">
          <button class="voz-add-btn" onclick="addVoiceTask(${v.id})">+ Tarea</button>
        </div>
      </div>
    </div>`;
  }).join('');
  body.innerHTML = html;
}
function addVoiceTask(vid) {
  const input = document.getElementById('voz-input-' + vid);
  const text = input.value.trim();
  if (!text) return;
  const v = voiceNotes.find(x => x.id===vid);
  if (!v) return;
  const assignee = currentUser;
  if (!v.derivedTasks) v.derivedTasks = [];
  v.derivedTasks.push({ text, assignee });
  saveVoice();
  tasks.unshift({ id:Date.now(), text, assignee, priority:'med', category:'otro', date:'', done:false, subtasks:[], created:new Date().toISOString(), fromVoice:true });
  save(); renderTasks(); updateProgress(); renderVoz();
  input.value = '';
}
function deleteVoice(id) {
  if (!confirm('¿Eliminar esta nota de voz?')) return;
  voiceNotes = voiceNotes.filter(x => x.id!==id); saveVoice(); renderVoz();
}

updateNames();
renderTasks();
renderNotes();
updateProgress();
